server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
   
    name: web
  datasource:
    url: jdbc:mysql://localhost:3306/web?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.web.pojo
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

ai:
  service:
    base-url: ${AI_SERVICE_BASE_URL:http://127.0.0.1:9000}
    timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:120}
    embedding-provider: ${AI_EMBEDDING_PROVIDER:local_bge_m3}
    vector-collection: ${CHROMA_COLLECTION:ecommerce_kb_v1}

kb:
  storage:
    root-path: ${KB_STORAGE_ROOT:./storage/kb}

order:
  cleanup:
    timeout-minutes: ${ORDER_TIMEOUT_MINUTES:30}
    batch-size: ${ORDER_CLEANUP_BATCH_SIZE:100}
    fixed-delay-ms: ${ORDER_CLEANUP_FIXED_DELAY_MS:60000}
