name: Bug report
description: Report a reproducible problem in ProjectKu Web.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please share enough detail so we can reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, ordered list.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - frontend (Vue storefront)
        - backend (Spring Boot API)
        - ai-service (FastAPI/RAG)
        - deploy/runtime
        - docs
        - unknown
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Tag, branch, or commit SHA if known.
      placeholder: e.g. v0.1.1 or main@abc1234
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, runtime versions, and relevant service setup.
      placeholder: Windows 11, Chrome 124, Node 20, Java 17, Python 3.11, MySQL 8
  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Paste error logs or attach screenshots where relevant.
      render: shell
