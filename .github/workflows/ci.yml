name: CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "back/**"
      - "ai-service/**"
      - "scripts/verify_frontend_text_encoding.js"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "back/**"
      - "ai-service/**"
      - "scripts/verify_frontend_text_encoding.js"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Build And Encoding
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

      - name: Verify Frontend Text Encoding
        run: node scripts/verify_frontend_text_encoding.js

  backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Backend Tests
        run: mvn -q test
        working-directory: back

  ai-service-light:
    name: AI Service Lightweight Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.remote.txt

      - name: Install AI Service Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.remote.txt pytest
        working-directory: ai-service

      - name: Run AI Service Lightweight Test Subset
        run: |
          pytest -q \
            tests/test_config.py \
            tests/test_sync_job.py \
            tests/test_product_tool_client.py \
            tests/test_business_tool_client.py \
            tests/test_lightrag_metadata_codec.py \
            tests/test_lightrag_client.py \
            tests/test_lightrag_retriever.py \
            tests/test_knowledge_retriever.py \
            tests/test_embedding_client.py \
            tests/test_neo4j_retriever.py \
            tests/test_chroma_retriever.py \
            tests/test_indexing_api.py
        working-directory: ai-service
